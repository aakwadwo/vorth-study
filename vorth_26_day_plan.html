<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorth Study — 26 Days</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #f5f4f0;
    --surface:  #ffffff;
    --surface2: #f0efe9;
    --border:   #e2e0d8;
    --border2:  #ccc9be;
    --text:     #1a1916;
    --muted:    #7a7870;
    --muted2:   #a8a69e;
    --accent:   #2d5a16;
    --accent-l: #e8f0e0;
    --p0: #0e6e9e; --p0bg: #e5f3fa;
    --p1: #a05a10; --p1bg: #fdf0e0;
    --p2: #7a18a0; --p2bg: #f5e8fc;
    --p3: #0e8a50; --p3bg: #e0f7ed;
    --p4: #b82020; --p4bg: #fce8e8;
    --p5: #2d5a16; --p5bg: #e8f0e0;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:       #0f0f0d;
      --surface:  #1a1a17;
      --surface2: #222220;
      --border:   #2e2e2a;
      --border2:  #3e3e38;
      --text:     #e8e6de;
      --muted:    #6b6960;
      --muted2:   #4a4942;
      --accent:   #8bc34a;
      --accent-l: #1a2208;
      --p0: #4aa8d8; --p0bg: #0d2535;
      --p1: #e09050; --p1bg: #2a1a08;
      --p2: #c060e0; --p2bg: #200a30;
      --p3: #40c080; --p3bg: #082518;
      --p4: #e05050; --p4bg: #2a0808;
      --p5: #8bc34a; --p5bg: #1a2208;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; transition: background .2s, color .2s; }

  /* HEADER */
  .hdr { padding: 52px 52px 36px; border-bottom: 1px solid var(--border); background: var(--surface); position: relative; overflow: hidden; }
  .hdr::after { content:''; position:absolute; bottom:-60px; right:-60px; width:280px; height:280px; background:radial-gradient(circle, rgba(139,195,74,.07) 0%, transparent 65%); pointer-events:none; }
  .hdr-tag { font-size:13px; letter-spacing:.15em; text-transform:uppercase; color:var(--accent); margin-bottom:16px; font-weight:500; }
  h1 { font-family:'Syne',sans-serif; font-size:clamp(32px,4vw,56px); font-weight:800; line-height:1.0; letter-spacing:-.025em; margin-bottom:14px; color:var(--text); }
  h1 em { color:var(--accent); font-style:normal; }
  .hdr-sub { font-size:14px; color:var(--muted); line-height:1.8; max-width:480px; }

  /* SYNC STATUS */
  .sync-badge {
    display:inline-flex; align-items:center; gap:6px;
    font-size:11px; color:var(--muted2);
    margin-top:12px;
  }
  .sync-dot {
    width:7px; height:7px; border-radius:50%;
    background: var(--muted2);
    transition: background .3s;
  }
  .sync-dot.syncing { background: #f0a020; animation: pulse 1s infinite; }
  .sync-dot.synced  { background: var(--accent); }
  .sync-dot.error   { background: #e04040; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* PROGRESS */
  .prog { display:grid; grid-template-columns:1fr auto; align-items:center; gap:32px; padding:22px 52px; border-bottom:1px solid var(--border); background:var(--surface); }
  .pb-track { height:3px; background:var(--border); border-radius:2px; }
  .pb-fill { height:3px; background:var(--accent); border-radius:2px; transition:width .5s cubic-bezier(.4,0,.2,1); position:relative; }
  .pb-fill::after { content:''; position:absolute; right:-4px; top:-3px; width:9px; height:9px; background:var(--accent); border-radius:50%; box-shadow:0 0 0 3px var(--accent-l); }
  .stats { display:flex; gap:28px; flex-shrink:0; }
  .stat { text-align:right; }
  .stat-n { font-family:'Syne',sans-serif; font-size:22px; font-weight:700; line-height:1; color:var(--text); }
  .stat-n small { font-size:13px; color:var(--muted); font-weight:400; }
  .stat-l { font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted2); margin-top:3px; }

  /* LAYOUT */
  .layout { display:grid; grid-template-columns:210px 1fr; }

  /* SIDEBAR */
  .sidebar { border-right:1px solid var(--border); background:var(--surface); padding:24px 0; position:sticky; top:0; height:calc(100vh - 148px); overflow-y:auto; }
  .sidebar::-webkit-scrollbar { width:0; }
  .nav-item { display:flex; align-items:center; gap:10px; padding:10px 22px; cursor:pointer; border-left:2px solid transparent; transition:all .15s; }
  .nav-item:hover { background:var(--surface2); }
  .nav-item.active { border-left-color:var(--accent); background:var(--accent-l); }
  .nav-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .nav-label { font-size:11px; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; line-height:1.5; }
  .nav-item.active .nav-label { color:var(--accent); }

  /* DAYS */
  .panel { padding:36px 48px; overflow-y:auto; }
  .phase-block { margin-bottom:52px; }
  .phase-hd { display:flex; align-items:center; gap:10px; margin-bottom:18px; padding-bottom:12px; border-bottom:1px solid var(--border); }
  .phase-pip { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .phase-lbl { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); }
  .phase-ct { margin-left:auto; font-size:12px; color:var(--muted2); }

  .card { display:grid; grid-template-columns:52px 1fr; gap:0 16px; padding:15px 0; border-bottom:1px solid var(--border); cursor:pointer; transition:all .12s; border-radius:6px; }
  .card:hover { background:var(--surface2); padding-left:10px; padding-right:10px; margin:0 -10px; }
  .card:last-child { border-bottom:none; }

  .num-col { display:flex; align-items:flex-start; justify-content:center; padding-top:2px; }
  .circle { width:36px; height:36px; border-radius:50%; border:1.5px solid var(--border2); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:500; color:var(--muted); cursor:pointer; transition:all .2s; user-select:none; flex-shrink:0; background:var(--surface); }
  .circle:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-l); }
  .card.done .circle { background:var(--accent); border-color:var(--accent); color:#fff; font-size:15px; }

  .body { min-width:0; }
  .title-row { display:flex; align-items:baseline; gap:8px; margin-bottom:5px; }
  .title { font-family:'Syne',sans-serif; font-size:15px; font-weight:600; color:var(--text); line-height:1.3; }
  .card.done .title { color:var(--muted2); text-decoration:line-through; text-decoration-color:var(--border2); }
  .chev { margin-left:auto; font-size:11px; color:var(--muted2); transition:transform .2s; }
  .card.open .chev { transform:rotate(180deg); }
  .meta { font-size:12px; color:var(--muted); margin-bottom:6px; }
  .vorth-row { font-size:12px; color:var(--muted); line-height:1.5; }
  .vtag { display:inline-block; font-size:10px; letter-spacing:.08em; text-transform:uppercase; padding:2px 8px; border-radius:3px; margin-right:6px; font-weight:500; }
  .detail { display:none; grid-column:1/-1; margin-top:14px; padding:16px 18px; background:var(--surface2); border-radius:6px; border-left:2px solid var(--border2); font-size:13px; color:var(--muted); line-height:1.85; }
  .card.open .detail { display:block; }

  /* LOADING OVERLAY */
  .loading {
    position:fixed; inset:0;
    background:var(--bg);
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:12px;
    z-index:100;
    transition:opacity .3s;
  }
  .loading.hidden { opacity:0; pointer-events:none; }
  .loading-text { font-size:13px; color:var(--muted); }
  .loading-spinner {
    width:24px; height:24px;
    border:2px solid var(--border2);
    border-top-color:var(--accent);
    border-radius:50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* phase colors */
  .c-p0{background:var(--p0)} .bg-p0{background:var(--p0bg);color:var(--p0)}
  .c-p1{background:var(--p1)} .bg-p1{background:var(--p1bg);color:var(--p1)}
  .c-p2{background:var(--p2)} .bg-p2{background:var(--p2bg);color:var(--p2)}
  .c-p3{background:var(--p3)} .bg-p3{background:var(--p3bg);color:var(--p3)}
  .c-p4{background:var(--p4)} .bg-p4{background:var(--p4bg);color:var(--p4)}
  .c-p5{background:var(--p5)} .bg-p5{background:var(--p5bg);color:var(--p5)}

  .panel::-webkit-scrollbar { width:3px; }
  .panel::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

  @media(max-width:680px) {
    .hdr,.prog { padding:28px 20px; }
    .layout { grid-template-columns:1fr; }
    .sidebar { display:none; }
    .panel { padding:24px 20px; }
    .prog { grid-template-columns:1fr; gap:14px; }
    .stats { justify-content:flex-start; }
  }
</style>
</head>
<body>

<div class="loading" id="loading">

</div>

<header class="hdr">

</div>

<div class="layout">

  <div class="panel" id="panel"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────
const BIN_ID    = '69e285b736566621a8c4d2da';

// ── DATA ────────────────────────────────────────────────
const PHASES = [

const DAYS = [
  { day:1,  p:'p0', title:'List, Dict, Set',                           meta:'Core storage · Python built-ins',              vorth:'Vorth Agri',         vd:'store farm records, look up yields, deduplicate crop types',                  detail:'Understand lists as ordered sequences, dicts as key-value lookups, sets as membership checkers. Build a farm registry: add farms, look up yield by name, find which crops appear more than once. The three questions: ordered sequence? key lookup? membership check?' },

  { day:16, p:'p3', title:'Maximum flow — Ford-Fulkerson',             meta:'Ch. 5 §5.1 · pp. 95–102',                     vorth:'Vorth Agri',         vd:'irrigation water allocation as a flow problem',                               detail:'Residual graph, augmenting paths. Implement Ford-Fulkerson manually. Build an irrigation network: reservoir → canals → fields → demand nodes. Understand why irrational capacities break this algorithm.' },

  { day:23, p:'p4', title:'Approximation algorithms',                  meta:'Ch. 8 §8.7–8.8 · pp. 165–189',                vorth:'Vorth Engine',       vd:'building approximation guarantees into Vorth solvers',                       detail:'Greedy 2-approximation for vertex cover. PTAS vs APX vs inapproximable. Build a 2-approximation for TSP using MST. Measure approximation ratio on random graphs.' },
  { day:24, p:'p5', title:'ILP modeling with PuLP and OR-Tools',       meta:'Synthesis · PuLP, OR-Tools CP-SAT',            vorth:'Vorth Agri',         vd:'full crop scheduling ILP model',                                             detail:'Formulate and solve a complete ILP: crop-season allocation across 20 farms, 5 crops, 3 seasons, market demand constraints. Compare OR-Tools CP-SAT vs PuLP/CBC on solve time and solution quality.' },
  { day:25, p:'p5', title:'Network optimization — full pipeline',      meta:'Synthesis · NetworkX, OR-Tools, scipy',        vorth:'Vorth Flow',         vd:'end-to-end supply chain optimization for Northern Ghana',                    detail:'Build a complete supply chain model: farm nodes → processing hubs → markets. Apply MCMF for routing. Add capacity constraints and seasonal demand. Benchmark against a greedy baseline.' },
  { day:26, p:'p5', title:'Vorth systems review and capstone',         meta:'Full review · all tools',                      vorth:'Vorth',              vd:'map every algorithm to its platform vertical',                               detail:'Review all phases. Solve 3 chapter exercises from scratch without help. Write a 1-page technical memo: which algorithms power which Vorth vertical and why. Identify next study topic: submodular optimization.' },
];

// ── STATE ───────────────────────────────────────────────
let done = new Set();
let saveTimer = null;

// ── SYNC INDICATOR ──────────────────────────────────────
function setSync(state, label) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot ' + state;
  lbl.textContent = label;
}

// ── JSONBIN API ─────────────────────────────────────────
async function loadFromCloud() {
  try {
    setSync('syncing', 'Loading...');
    const res = await fetch(API_BASE + '/latest', {
      headers: { 'X-Access-Key': ACCESS_KEY }
    });
    if (!res.ok) throw new Error('fetch failed');
    const json = await res.json();
    const arr = json.record?.done || [];
    done = new Set(arr);
    setSync('synced', 'Synced');
  } catch (e) {
    // fall back to localStorage
    const local = JSON.parse(localStorage.getItem('vorth26_v2') || '[]');
    done = new Set(local);
    setSync('error', 'Offline — using local');
  }
  document.getElementById('loading').classList.add('hidden');
  build();
  updateStats();
}

async function saveToCloud() {
  setSync('syncing', 'Saving...');
  const arr = [...done];
  localStorage.setItem('vorth26_v2', JSON.stringify(arr));
  try {
    const res = await fetch(API_BASE, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Access-Key': ACCESS_KEY
      },
      body: JSON.stringify({ done: arr })
    });
    if (!res.ok) throw new Error('save failed');
    setSync('synced', 'Synced');
  } catch (e) {
    setSync('error', 'Saved locally only');
  }
}

function debouncedSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToCloud, 800);
}

// ── STATS ────────────────────────────────────────────────
function updateStats() {
  const n = done.size, pct = Math.round(n / 26 * 100);
  document.getElementById('pb').style.width = pct + '%';
  document.getElementById('sn').textContent = n;
  document.getElementById('sp').innerHTML = pct + '<small>%</small>';
}

// ── BUILD UI ─────────────────────────────────────────────
function build() {
  const nav = document.getElementById('sidebar');
  nav.innerHTML = '';
  PHASES.forEach(p => {
    const el = document.createElement('div');
    el.className = 'nav-item';
    el.dataset.pid = p.id;
    el.innerHTML = `<div class="nav-dot c-${p.id}"></div><div class="nav-label">${p.label}<br>${p.sub}</div>`;
    el.onclick = () => document.getElementById('b-' + p.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    nav.appendChild(el);
  });

  const panel = document.getElementById('panel');
  panel.innerHTML = '';

  PHASES.forEach(p => {
    const pdays = DAYS.filter(d => d.p === p.id);
    const doneN = pdays.filter(d => done.has(d.day)).length;
    const block = document.createElement('div');
    block.className = 'phase-block';
    block.id = 'b-' + p.id;
    block.innerHTML = `<div class="phase-hd"><div class="phase-pip c-${p.id}"></div><div class="phase-lbl">${p.label} — ${p.sub}</div><div class="phase-ct">${doneN}/${pdays.length}</div></div>`;

    pdays.forEach(d => {
      const isDone = done.has(d.day);
      const card = document.createElement('div');
      card.className = 'card' + (isDone ? ' done' : '');
      card.innerHTML = `
        <div class="num-col"><div class="circle">${isDone ? '✓' : d.day}</div></div>
        <div class="body">
          <div class="title-row">
            <div class="title">${d.title}</div>
            <div class="chev">▾</div>
          </div>
          <div class="meta">${d.meta}</div>
          <div class="vorth-row"><span class="vtag bg-${d.p}">${d.vorth}</span>${d.vd}</div>
          <div class="detail">${d.detail}</div>
        </div>
      `;

      card.addEventListener('click', e => {
        if (e.target.closest('.circle')) return;
        const open = card.classList.contains('open');
        document.querySelectorAll('.card.open').forEach(c => c.classList.remove('open'));
        if (!open) card.classList.add('open');
      });

      card.querySelector('.circle').addEventListener('click', e => {
        e.stopPropagation();
        if (done.has(d.day)) done.delete(d.day); else done.add(d.day);
        debouncedSave();
        build();
        updateStats();
      });

      block.appendChild(card);
    });
    panel.appendChild(block);
  });

  // sidebar active state on scroll
  const obs = new IntersectionObserver(entries => {
    entries.forEach(en => {
      if (en.isIntersecting) {
        const id = en.target.id.replace('b-', '');
        document.querySelectorAll('.nav-item').forEach(el =>
          el.classList.toggle('active', el.dataset.pid === id)
        );
      }
    });
  }, { threshold: 0.2 });
  PHASES.forEach(p => {
    const el = document.getElementById('b-' + p.id);
    if (el) obs.observe(el);
  });
}

// ── INIT ─────────────────────────────────────────────────
loadFromCloud();
</script>
</body>
</html>
